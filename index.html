<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f9f9f7;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --blue-bg: #E6F1FB;
    --blue: #185FA5;
    --blue-focus: rgba(24,95,165,0.12);
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
      --text: #f0f0ee;
      --text2: #aaaaaa;
      --text3: #666666;
      --blue-bg: #042C53;
      --blue: #85B7EB;
      --blue-focus: rgba(133,183,235,0.12);
      --green: #C0DD97;
      --green-bg: #173404;
    }
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  h1 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 1.5rem; }

  .wrap { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }

  .url-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .url-label { font-size: 15px; font-weight: 500; color: var(--text); }
  .url-input-wrap { position: relative; }
  .url-input { width: 100%; font-family: var(--sans); font-size: 15px; color: var(--text); background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; padding: 13px 42px 13px 14px; outline: none; transition: border-color 0.12s, box-shadow 0.12s; }
  .url-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-focus); }
  .url-input::placeholder { color: var(--text3); }
  .url-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text3); display: none; padding: 2px; line-height: 0; }
  .url-clear:hover { color: var(--text2); }
  .url-clear.visible { display: block; }
  .slug-row { min-height: 26px; display: flex; align-items: center; }
  .slug-pill { font-family: var(--mono); font-size: 13px; color: var(--blue); background: var(--blue-bg); padding: 4px 10px; border-radius: 20px; word-break: break-all; }
  .slug-hint { font-size: 13px; color: var(--text3); }

  details { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 0.875rem 1.25rem; }
  details[open] { padding-bottom: 1.125rem; }
  details summary { font-size: 12px; color: var(--text3); cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; }
  details summary::before { content: '▸'; font-size: 10px; transition: transform 0.15s; display: inline-block; }
  details[open] summary::before { transform: rotate(90deg); }
  details summary::-webkit-details-marker { display: none; }
  details .inner { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.875rem; }

  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
  input, textarea { width: 100%; font-family: var(--mono); font-size: 13px; color: var(--text); background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; padding: 8px 10px; outline: none; transition: border-color 0.12s; }
  input:focus, textarea:focus { border-color: var(--blue); }
  textarea { resize: vertical; min-height: 68px; line-height: 1.55; }
  code { font-family: var(--mono); font-size: 12px; background: var(--surface2); padding: 1px 5px; border-radius: 4px; border: 0.5px solid var(--border); }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.125rem 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }

  .groups { display: flex; flex-direction: column; gap: 10px; }
  .group { border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .group-header { padding: 8px 12px; background: var(--surface2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .group-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .group-dot.primary { background: var(--blue); }
  .group-dot.secondary { background: var(--text3); opacity: 0.5; }
  .group-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .group-label.primary { color: var(--blue); }
  .group-label.secondary { color: var(--text3); }

  .cmd-item { border-top: 0.5px solid var(--border); }
  .cmd-item:first-child { border-top: none; }
  .cmd-row { display: flex; align-items: stretch; }
  .cmd-left { flex: 1; min-width: 0; }
  .cmd-name { font-size: 13px; font-weight: 500; color: var(--text); padding: 9px 12px 2px; }
  .cmd-slug { font-family: var(--mono); font-size: 11px; color: var(--blue); padding: 0 12px 6px; word-break: break-all; }
  .cmd-body { font-family: var(--mono); font-size: 12px; color: var(--text2); line-height: 1.55; padding: 0 12px 10px; word-break: break-all; white-space: pre-wrap; }

  .copy-btn { flex-shrink: 0; width: 82px; border: none; border-left: 0.5px solid var(--border); background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: var(--text3); font-size: 11px; font-family: var(--sans); transition: background 0.1s, color 0.1s; }
  .copy-btn:hover { background: var(--surface2); color: var(--text2); }
  .copy-btn.ok { color: var(--green); background: var(--green-bg); }

  .empty { font-size: 13px; color: var(--text3); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Polymarket order generator</h1>

  <div class="url-card">
    <div class="url-label">Ссылка на событие</div>
    <div class="url-input-wrap">
      <input class="url-input" type="text" id="url" placeholder="https://polymarket.com/event/…" autocomplete="off" spellcheck="false">
      <button class="url-clear" id="url-clear" onclick="clearUrl()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"></circle>
          <line x1="5" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></line>
          <line x1="11" y1="5" x2="5" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></line>
        </svg>
      </button>
    </div>
    <div class="slug-row">
      <div id="slug-display" class="slug-hint">вставьте ссылку выше</div>
    </div>
  </div>

  <details>
    <summary>Дополнительные настройки</summary>
    <div class="inner">
      <div>
        <label>Шаблон — плейсхолдеры <code>{size}</code> и <code>{slug}</code></label>
        <textarea id="template">uv run python send_order.py --type market --size {size} --chunk {size} --price 0.99 --slug {slug}</textarea>
      </div>
      <div style="max-width: 200px;">
        <label>Сумма трейда (size)</label>
        <input type="number" id="size" value="500" min="1">
      </div>
    </div>
  </details>

  <div class="card">
    <span class="card-title">Команды</span>
    <div class="groups" id="groups"><div class="empty">Введите ссылку выше</div></div>
  </div>
</div>

<script>
const PRIMARY = [
  { label: 'Матч', suffix: '' },
  { label: 'Game 1', suffix: '-game1' },
  { label: 'Game 2', suffix: '-game2' },
  { label: 'Total games 2.5', suffix: '-total-games-2pt5' },
];
const SECONDARY = [
  { label: 'Game 3', suffix: '-game3' },
  { label: 'Total games 3.5', suffix: '-total-games-3pt5' },
  { label: 'Total games 4.5', suffix: '-total-games-4pt5' },
];

function extractSlug(url) {
  url = url.trim();
  if (!url) return '';
  try {
    const u = new URL(url.startsWith('http') ? url : 'https://' + url);
    const parts = u.pathname.split('/').filter(Boolean);
    return parts[parts.length - 1] || '';
  } catch(e) {
    const parts = url.split('/').filter(Boolean);
    return parts[parts.length - 1] || '';
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyToClipboard(text) {
  // Try modern API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return Promise.resolve(fallbackCopy(text));
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

const copyIconSVG = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="1" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="4" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="var(--surface)"/></svg>`;
const checkIconSVG = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><polyline points="2,9 6,13 14,4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

let allCmds = {};

function buildGroup(markets, slug, template, size, cls, title, startIdx) {
  const items = markets.map((m, j) => {
    const i = startIdx + j;
    const fullSlug = slug + m.suffix;
    const cmd = template.replace(/\{size\}/g, size).replace(/\{slug\}/g, fullSlug);
    allCmds[i] = cmd;
    return `<div class="cmd-item"><div class="cmd-row">
      <div class="cmd-left">
        <div class="cmd-name">${m.label}</div>
        <div class="cmd-slug">${fullSlug}</div>
        <div class="cmd-body">${esc(cmd)}</div>
      </div>
      <button class="copy-btn" id="btn-${i}" onclick="copyCmd(${i})">${copyIconSVG}<span>Копировать</span></button>
    </div></div>`;
  }).join('');
  return `<div class="group">
    <div class="group-header">
      <div class="group-dot ${cls}"></div>
      <span class="group-label ${cls}">${title}</span>
    </div>
    ${items}
  </div>`;
}

function render() {
  const template = document.getElementById('template').value;
  const size = document.getElementById('size').value.trim();
  const url = document.getElementById('url').value;
  const slug = extractSlug(url);

  document.getElementById('url-clear').classList.toggle('visible', url.length > 0);

  const sd = document.getElementById('slug-display');
  if (slug) { sd.className = 'slug-pill'; sd.textContent = slug; }
  else { sd.className = 'slug-hint'; sd.textContent = url.trim() ? 'не удалось извлечь slug' : 'вставьте ссылку выше'; }

  const groups = document.getElementById('groups');
  if (!slug || !size) { groups.innerHTML = '<div class="empty">Введите ссылку выше</div>'; return; }

  allCmds = {};
  groups.innerHTML =
    buildGroup(PRIMARY,   slug, template, size, 'primary',   'Основные',  0) +
    buildGroup(SECONDARY, slug, template, size, 'secondary', 'Остальные', PRIMARY.length);
}

function copyCmd(i) {
  copyToClipboard(allCmds[i]).then(() => {
    const btn = document.getElementById('btn-' + i);
    btn.innerHTML = checkIconSVG + '<span>Скопировано</span>';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.innerHTML = copyIconSVG + '<span>Копировать</span>';
      btn.classList.remove('ok');
    }, 1500);
  });
}

function clearUrl() {
  document.getElementById('url').value = '';
  render();
  document.getElementById('url').focus();
}

['template', 'size', 'url'].forEach(id =>
  document.getElementById(id).addEventListener('input', render)
);
render();
</script>


</body></html>
